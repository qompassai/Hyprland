# References: https://wiki.archlinux.org/title/Firefox#Wayland | https://github.com/openjdk/jdk/blob/master/src/java.desktop/unix/classes/sun/awt/X11/XWM.java
$bin =                                                     ~/.local/bin
env = _JAVA_AWT_WM_NONREPARENTING                          , 1
env = MOZ_DBUS_REMOTE                                      , 1
env = MOZ_ENABLE_WAYLAND                                   , 1
env = MOZ_WEBRENDER                                        , 1
env = NO_AT_BRIDGE                                         , 1
env = SWWW_TRANSITION                                      , grow
env = SWWW_TRANSITION_FPS                                  , 60
env = SWWW_TRANSITION_DURATION                             , 1
env = SWWW_UPDATE_HOOK                                     , $bin/on-swww-update
